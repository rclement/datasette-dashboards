name: CI/CD

on:
  push:
    branches:
      - master
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

env:
  DEMO_BASE_URL_PREVIEW: dd-demo.vercel.app
  DEMO_BASE_URL_PRODUCTION: datasette-dashboards-demo.vercel.app

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Run linting
        run: |
          uv run invoke lint
          uv run invoke typing
      - name: Run tests
        run: uv run invoke test
      - name: Upload coverage artifacts
        if: ${{ matrix.python-version == '3.14' }}
        uses: actions/upload-artifact@v6
        with:
          name: coverage
          path: .coverage
          include-hidden-files: true

  coverage:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      issues: write
      pull-requests: write
    env:
      COVERAGE_MD_FILE: "coverage.md"
      COVERAGE_REPORT_TITLE: "Code coverage report"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - uses: actions/download-artifact@v7
        with:
          name: coverage
      - name: Generate Markdown code coverage report
        run: |
          uv run coverage xml
          echo "# ${COVERAGE_REPORT_TITLE}" >> "${COVERAGE_MD_FILE}"
          uv run coverage report --show-missing --format=markdown >> "${COVERAGE_MD_FILE}"
      - name: Compute diff coverage with target branch
        if: ${{ github.event_name == 'pull_request' }}
        env:
          TARGET_BRANCH: origin/${{ github.event.pull_request.base.ref }}
          DIFFCOV_MD_FILE: "diff-coverage.md"
        run: |
          uv run --with diff_cover diff-cover --compare-branch ${TARGET_BRANCH} --diff-range-notation '..' --ignore-staged --ignore-unstaged --markdown-report "${DIFFCOV_MD_FILE}" coverage.xml
          if [ -f "${DIFFCOV_MD_FILE}" ]; then
            cat "${DIFFCOV_MD_FILE}" >> "${COVERAGE_MD_FILE}"
          else
            echo "## Diff coverage" >> "${COVERAGE_MD_FILE}"
            echo "Diff coverage report could not be generated (missing ${DIFFCOV_MD_FILE})." >> "${COVERAGE_MD_FILE}"
          fi
      - name: Export code coverage report to job summary
        run: cat "${COVERAGE_MD_FILE}" >> "${GITHUB_STEP_SUMMARY}"
      - name: Add or update code coverage comment to pull request
        uses: actions/github-script@v8
        if: ${{ github.event_name == 'pull_request' }}
        with:
          script: |
            const fs = require('fs')

            const body = fs.readFileSync(`${process.env.COVERAGE_MD_FILE}`, 'utf-8')

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
              }
            )
            const matches = comments.filter(
              comment => comment.body && comment.body.includes(`${process.env.COVERAGE_REPORT_TITLE}`)
            )
            const comment = matches[0]

            if (comment) {
              const commentId = comment.id
              console.log(`updating existing comment: comment_id=${commentId}`)
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: commentId,
                body: body,
              })
            } else {
              console.log('adding new comment')
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body,
              })
            }

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Build package
        run: uv build
      - name: Upload package build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: build
          path: dist
          include-hidden-files: true

  publish-package-test:
    runs-on: ubuntu-latest
    needs: build
    if: contains(github.ref, 'master')
    environment:
      name: test-pypi
      url: https://test.pypi.org/project/datasette-dashboards/
    permissions:
      id-token: write
    steps:
      - name: Download package build artifacts
        uses: actions/download-artifact@v7
        with:
          name: build
          path: dist/
      - name: Publish package distributions to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-package:
    runs-on: ubuntu-latest
    needs: build
    if: contains(github.ref, 'tags')
    environment:
      name: pypi
      url: https://pypi.org/project/datasette-dashboards/
    permissions:
      id-token: write
    steps:
      - name: Download package build artifacts
        uses: actions/download-artifact@v7
        with:
          name: build
          path: dist/
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  deploy-demo-setup:
    name: Deployment setup
    runs-on: ubuntu-latest
    needs: test

    outputs:
      branch_name_slug: ${{ steps.output_step.outputs.branch_name_slug }}
      deployment_url: ${{ steps.output_step.outputs.deployment_url }}

    steps:
      - name: Inject slug/short variables
        uses: rlespinasse/github-slug-action@v5
      - name: Get current branch name slug
        # retrieving the branch name depends on the event type:
        # - pull_request events: GITHUB_HEAD_REF_SLUG_URL
        # - push events: GITHUB_REF_SLUG_URL
        # - delete events: GITHUB_EVENT_REF_SLUG_URL
        run: echo "BRANCH_NAME_SLUG=${GITHUB_HEAD_REF_SLUG_URL:-${GITHUB_REF_SLUG_URL}}" >> $GITHUB_ENV
      - name: Set preview deployment url variable
        if: ${{ !contains(github.ref, 'master') && !contains(github.ref, 'tags') }}
        run: echo "DEPLOYMENT_URL=https://${BRANCH_NAME_SLUG}-${DEMO_BASE_URL_PREVIEW}" >> $GITHUB_ENV
      - name: Set production deployment url variable
        if: ${{ contains(github.ref, 'master') }}
        run: echo "DEPLOYMENT_URL=https://${DEMO_BASE_URL_PRODUCTION}" >> ${GITHUB_ENV}
      - id: output_step
        run: |
          echo "branch_name_slug=${BRANCH_NAME_SLUG}" >> $GITHUB_OUTPUT
          echo "deployment_url=${DEPLOYMENT_URL}" >> $GITHUB_OUTPUT

  deploy-demo-preview:
    runs-on: ubuntu-latest
    needs: deploy-demo-setup
    if: ${{ !contains(github.ref, 'master') && !contains(github.ref, 'tags') }}

    environment:
      name: preview/${{ needs.deploy-demo-setup.outputs.branch_name_slug }}
      url: ${{ needs.deploy-demo-setup.outputs.deployment_url }}

    env:
      BRANCH_NAME_SLUG: ${{ needs.deploy-demo-setup.outputs.branch_name_slug }}

    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Deploy to Vercel
        run: |-
          VERCEL_ALIAS=${BRANCH_NAME_SLUG}-${DEMO_BASE_URL_PREVIEW}
          VERCEL_URL=$(uv run datasette publish vercel demo/jobs.db \
            --metadata demo/metadata.yml \
            --template-dir demo/templates \
            --install=datasette-cluster-map \
            --install=datasette-vega \
            --install=datasette-block-robots \
            --install=https://github.com/rclement/datasette-dashboards/archive/${GITHUB_SHA}.zip \
            --project=${{ secrets.VERCEL_PROJECT }} \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --vercel-json=demo/vercel.json \
            --no-prod)
          vercel alias --token ${{ secrets.VERCEL_TOKEN }} set ${VERCEL_URL} ${VERCEL_ALIAS}

  deploy-demo-production:
    runs-on: ubuntu-latest
    needs: deploy-demo-setup
    if: contains(github.ref, 'master')

    environment:
      name: demo
      url: ${{ needs.deploy-demo-setup.outputs.deployment_url }}

    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies
        run: uv sync --all-extras --dev
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Deploy to Vercel
        run: |-
          uv run datasette publish vercel demo/jobs.db \
            --metadata demo/metadata.yml \
            --template-dir demo/templates \
            --install=datasette-cluster-map \
            --install=datasette-vega \
            --install=datasette-block-robots \
            --install=https://github.com/rclement/datasette-dashboards/archive/${GITHUB_SHA}.zip \
            --project=${{ secrets.VERCEL_PROJECT }} \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --vercel-json=demo/vercel.json
