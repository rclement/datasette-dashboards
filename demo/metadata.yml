title: Datasette Dashboards Demo
about: rclement/datasette-dashboards
about_url: https://github.com/rclement/datasette-dashboards
description_html: |-
  <div class="message-info">
    <p>Welcome to the <a href="https://github.com/rclement/datasette-dashboards">Datasette Dashboards plugin</a> demo!</p>
    <ul class="bullets">
      <li>Browse dashboards at <a href="/-/dashboards">/-/dashboards</a></li>
      <li>See an example of an embedded dashboard within a custom page at <a href="/embedded_dashboard">/embedded_dashboard</a></li>
      <li>See an example of an embedded chart within a custom page at <a href="/embedded_chart">/embedded_chart</a></li>
    </ul>
  </div>

databases:
  jobs:
    tables:
      offers_view:
        fts_table: offers_fts
        fts_pk: id
        searchmode: raw

plugins:
  datasette-dashboards:
    job-offers-stats:
      title: Job offers statistics
      description: Gather metrics about job offers
      settings:
        allow_fullscreen: true
        autorefresh: 1
      layout:
        - [analysis-note, offers-day, offers-day, offers-count]
        - [analysis-note, offers-source, offers-day-source, offers-region]
        - [job-titles, offers-map, latest-offers, latest-offers]
      filters:
        date_start:
          name: Date Start
          type: date
          default: "2021-01-01"
        date_end:
          name: Date End
          type: date
        source:
          name: Source
          type: select
          db: jobs
          query: SELECT DISTINCT source FROM offers_view WHERE source IS NOT NULL ORDER BY source ASC
        region:
          name: Region
          type: select
          db: jobs
          query: SELECT DISTINCT region FROM offers_view WHERE region IS NOT NULL [[ AND source = :source ]] ORDER BY region ASC
        company:
          name: Company
          type: select
          db: jobs
          query: SELECT DISTINCT company FROM offers_view WHERE company IS NOT NULL [[ AND source = :source ]] [[ AND region = :region ]] ORDER BY company ASC
        job_title:
          name: Job Title
          type: text
      charts:
        analysis-note:
          library: markdown
          display: |-
            # Analysis details

            We wanted to analyze data from job offers, using the **`python` search keyword**
            from three sources of job-boards:
            [APEC](https://www.apec.fr),
            [Indeed](https://fr.indeed.com/) and
            [RegionsJob](https://regionsjob.com).

            ## Process

            The process was in 3 steps:

            - Extraction
            - Transformation
            - Loading

            After the ETL process, an extra data enrichment step was developed to provide
            location geocoding, based on place names.

            ## SQL query

            ```sql
            SELECT
              date(date) as day,
              count(*) as count
            FROM offers_view
            GROUP BY day
            ORDER BY day
            ```

        offers-count:
          title: Total number of offers
          db: jobs
          query: >-
            SELECT count(*) as count
            FROM offers_view
            WHERE TRUE
              [[ AND date >= date(:date_start) ]]
              [[ AND date <= date(:date_end) ]]
              [[ AND source = :source ]]
              [[ AND region = :region ]]
              [[ AND company = :company ]]
              [[ AND id IN (SELECT rowid FROM offers_fts WHERE offers_fts MATCH :job_title) ]]
          library: metric
          display:
            field: count
            prefix:
            suffix: " offers"

        offers-day:
          title: Number of offers by day
          db: jobs
          query: >-
            SELECT
              date(date) as day,
              count(*) as count
            FROM offers_view
            WHERE TRUE
              [[ AND date >= date(:date_start) ]]
              [[ AND date <= date(:date_end) ]]
              [[ AND source = :source ]]
              [[ AND region = :region ]]
              [[ AND company = :company ]]
              [[ AND id IN (SELECT rowid FROM offers_fts WHERE offers_fts MATCH :job_title) ]]
            GROUP BY day
            ORDER BY day
          library: line
          display:
            x: { field: day, type: temporal, timeUnit: yearmonthdate }
            y: count

        offers-source:
          title: Number of offers by source
          db: jobs
          query: >-
            SELECT
              source,
              count(*) as count
            FROM offers_view
            WHERE TRUE
              [[ AND date >= date(:date_start) ]]
              [[ AND date <= date(:date_end) ]]
              [[ AND region = :region ]]
              [[ AND company = :company ]]
              [[ AND id IN (SELECT rowid FROM offers_fts WHERE offers_fts MATCH :job_title) ]]
            GROUP BY source
            ORDER BY count DESC
          library: pie
          display:
            label: source
            value: count

        offers-day-source:
          title: Offers by day by source
          db: jobs
          query: >-
            SELECT
              date(date) as day,
              source,
              count(*) as count
            FROM offers_view
            WHERE TRUE
              [[ AND date >= date(:date_start) ]]
              [[ AND date <= date(:date_end) ]]
              [[ AND region = :region ]]
              [[ AND company = :company ]]
              [[ AND id IN (SELECT rowid FROM offers_fts WHERE offers_fts MATCH :job_title) ]]
            GROUP BY day, source
            ORDER BY day
          library: bar
          display:
            x: { field: day, type: temporal, timeUnit: yearmonthdate }
            y: count
            color: source

        offers-region:
          title: Offers by region
          db: jobs
          query: >-
            SELECT
              region,
              count(*) AS count
            FROM offers_view
            WHERE region IS NOT NULL
              [[ AND date >= date(:date_start) ]]
              [[ AND date <= date(:date_end) ]]
              [[ AND source = :source ]]
              [[ AND region = :region ]]
              [[ AND company = :company ]]
              [[ AND id IN (SELECT rowid FROM offers_fts WHERE offers_fts MATCH :job_title) ]]
            GROUP BY region
            ORDER BY count DESC
          library: choropleth
          display:
            label: region
            value: count
            geodata_url: https://raw.githubusercontent.com/gregoiredavid/france-geojson/master/regions.geojson
            geodata_key: properties.nom
            projection: mercator
            color_scheme: blues

        job-titles:
          title: Word cloud of job titles
          db: jobs
          query: >-
            SELECT
              b.value AS word,
              COUNT(*) AS frequency
            FROM (
                SELECT '["' || lower(replace(trim(title), ' ', '", "')) || '"]' AS array
                FROM offers_view
                WHERE TRUE
                  [[ AND date >= date(:date_start) ]]
                  [[ AND date <= date(:date_end) ]]
                  [[ AND source = :source ]]
                  [[ AND region = :region ]]
                  [[ AND company = :company ]]
                  [[ AND id IN (SELECT rowid FROM offers_fts WHERE offers_fts MATCH :job_title) ]]
              ) a,
              json_each(a.array) b
            WHERE length(b.value) > 3
            GROUP BY b.value
            ORDER BY frequency DESC
            LIMIT 100
          library: wordcloud
          display:
            height: 150
            text: word
            size: frequency

        latest-offers:
          title: Latest offers
          db: jobs
          query: >-
            SELECT
              date(date) as Date,
              title as Title,
              company as Company,
              '<a href="' || url || '">' || source || '</a>' as Link
            FROM offers_view
            WHERE TRUE
              [[ AND date >= date(:date_start) ]]
              [[ AND date <= date(:date_end) ]]
              [[ AND source = :source ]]
              [[ AND region = :region ]]
              [[ AND company = :company ]]
              [[ AND id IN (SELECT rowid FROM offers_fts WHERE offers_fts MATCH :job_title) ]]
            ORDER BY date DESC
            LIMIT 5
          library: table
          display:

        offers-map:
          title: Offers map
          db: jobs
          query: >-
            SELECT
              date(date) as Date,
              title as Title,
              company as Company,
              source as Source,
              city as City,
              longitude,
              latitude
            FROM offers_view
            WHERE longitude IS NOT NULL AND latitude IS NOT NULL
              [[ AND date >= date(:date_start) ]]
              [[ AND date <= date(:date_end) ]]
              [[ AND source = :source ]]
              [[ AND region = :region ]]
              [[ AND company = :company ]]
              [[ AND id IN (SELECT rowid FROM offers_fts WHERE offers_fts MATCH :job_title) ]]
          library: map
          display:

    chart-types:
      title: Chart types showcase
      description: All available chart types with inline sample data
      settings:
        allow_fullscreen: true
      layout:
        - [intro-note, intro-note, metric-visitors, metric-revenue]
        - [line-chart, line-chart, area-chart, area-chart]
        - [bar-chart, pie-chart, scatter-chart, table-chart]
        - [wordcloud-chart, wordcloud-chart, choropleth-chart, choropleth-chart]
        - [vega-lite-chart, vega-lite-chart, vega-chart, vega-chart]
        - [map-chart, map-chart, map-chart, map-chart]
      charts:
        intro-note:
          library: markdown
          display: |-
            # Chart types showcase

            This dashboard demonstrates **all available chart types** using inline sample data,
            so you can see the expected data shape for each type.

            **Shorthand types** (semantic YAML → Vega/Vega-Lite):
            `line`, `area`, `bar`, `scatter`, `pie`, `wordcloud`, `choropleth`

            **Raw specification types:**
            `vega-lite`, `vega`

            **Other types:**
            `metric`, `table`, `map`, `markdown`

        metric-visitors:
          title: Monthly visitors (metric)
          db: jobs
          query: SELECT 84320 as visitors
          library: metric
          display:
            field: visitors
            prefix:
            suffix: " visitors"

        metric-revenue:
          title: Monthly revenue (metric)
          db: jobs
          query: SELECT 12450 as revenue
          library: metric
          display:
            field: revenue
            prefix: "$"
            suffix:

        line-chart:
          title: Average temperature by month (line)
          db: jobs
          query: >-
            SELECT column1 as month, column2 as avg_temp
            FROM (VALUES
            ('2024-01', 3.5),
            ('2024-02', 4.2),
            ('2024-03', 8.7),
            ('2024-04', 13.1),
            ('2024-05', 17.8),
            ('2024-06', 22.4),
            ('2024-07', 24.8),
            ('2024-08', 24.1),
            ('2024-09', 19.5),
            ('2024-10', 13.8),
            ('2024-11', 8.2),
            ('2024-12', 4.6))
          library: line
          display:
            x: month
            y: avg_temp

        area-chart:
          title: Monthly sales by product (area)
          db: jobs
          query: >-
            SELECT column1 as month, column2 as product, column3 as sales
            FROM (VALUES
            ('2024-01', 'Widgets', 80),
            ('2024-01', 'Gadgets', 40),
            ('2024-02', 'Widgets', 95),
            ('2024-02', 'Gadgets', 55),
            ('2024-03', 'Widgets', 110),
            ('2024-03', 'Gadgets', 70),
            ('2024-04', 'Widgets', 85),
            ('2024-04', 'Gadgets', 55),
            ('2024-05', 'Widgets', 120),
            ('2024-05', 'Gadgets', 80),
            ('2024-06', 'Widgets', 135),
            ('2024-06', 'Gadgets', 90))
          library: area
          display:
            x: month
            y: sales
            color: product

        bar-chart:
          title: Programming language popularity (bar)
          db: jobs
          query: >-
            SELECT column1 as language, column2 as share
            FROM (VALUES
            ('Python', 30.3),
            ('JavaScript', 25.1),
            ('Java', 18.5),
            ('C#', 12.4),
            ('Go', 8.7),
            ('Rust', 5.0))
          library: bar
          display:
            x: language
            y: share
            color: language

        pie-chart:
          title: Browser market share (pie)
          db: jobs
          query: >-
            SELECT column1 as browser, column2 as share
            FROM (VALUES
            ('Chrome', 65.0),
            ('Safari', 18.5),
            ('Edge', 5.5),
            ('Firefox', 4.0),
            ('Other', 7.0))
          library: pie
          display:
            label: browser
            value: share

        scatter-chart:
          title: Ad spend vs revenue by channel (scatter)
          db: jobs
          query: >-
            SELECT column1 as ad_spend, column2 as revenue, column3 as channel
            FROM (VALUES
            (10, 42, 'Online'),
            (20, 78, 'Online'),
            (15, 55, 'Online'),
            (30, 95, 'Online'),
            (25, 85, 'Online'),
            (5, 30, 'Print'),
            (10, 40, 'Print'),
            (15, 48, 'Print'),
            (20, 52, 'Print'),
            (8, 35, 'Print'))
          library: scatter
          display:
            x: ad_spend
            y: revenue
            color: channel

        table-chart:
          title: Largest cities by population (table)
          db: jobs
          query: >-
            SELECT column1 as City, column2 as Country, column3 as Population
            FROM (VALUES
            ('Tokyo', 'Japan', 13960000),
            ('Delhi', 'India', 16314000),
            ('Shanghai', 'China', 24280000),
            ('São Paulo', 'Brazil', 12325000),
            ('Mexico City', 'Mexico', 9209944))
          library: table
          display:

        wordcloud-chart:
          title: Technology keywords (wordcloud)
          db: jobs
          query: >-
            SELECT column1 as word, column2 as frequency
            FROM (VALUES
            ('AI', 95),
            ('Python', 90),
            ('Machine Learning', 85),
            ('Cloud', 80),
            ('Kubernetes', 70),
            ('Docker', 68),
            ('React', 65),
            ('TypeScript', 60),
            ('DevOps', 55),
            ('Serverless', 45),
            ('GraphQL', 40),
            ('Rust', 38),
            ('Blockchain', 30),
            ('IoT', 28),
            ('WebAssembly', 25))
          library: wordcloud
          display:
            text: word
            size: frequency

        choropleth-chart:
          title: GDP index by French region (choropleth)
          db: jobs
          query: >-
            SELECT column1 as region, column2 as gdp_index
            FROM (VALUES
            ('Île-de-France', 100),
            ('Auvergne-Rhône-Alpes', 78),
            ('Provence-Alpes-Côte d''Azur', 82),
            ('Hauts-de-France', 65),
            ('Nouvelle-Aquitaine', 72),
            ('Occitanie', 68),
            ('Grand Est', 70),
            ('Pays de la Loire', 71),
            ('Normandie', 63),
            ('Bretagne', 66),
            ('Bourgogne-Franche-Comté', 60),
            ('Centre-Val de Loire', 62),
            ('Corse', 58))
          library: choropleth
          display:
            label: region
            value: gdp_index
            geodata_url: https://raw.githubusercontent.com/gregoiredavid/france-geojson/master/regions.geojson
            geodata_key: properties.nom

        vega-lite-chart:
          title: Sales heatmap by month and category (vega-lite)
          db: jobs
          query: >-
            SELECT column1 as month, column2 as category, column3 as sales
            FROM (VALUES
            ('Jan', 'Electronics', 45),
            ('Jan', 'Clothing', 30),
            ('Jan', 'Food', 60),
            ('Feb', 'Electronics', 55),
            ('Feb', 'Clothing', 40),
            ('Feb', 'Food', 50),
            ('Mar', 'Electronics', 35),
            ('Mar', 'Clothing', 65),
            ('Mar', 'Food', 45),
            ('Apr', 'Electronics', 70),
            ('Apr', 'Clothing', 55),
            ('Apr', 'Food', 40))
          library: vega-lite
          display:
            mark: { type: rect, tooltip: true }
            encoding:
              x: { field: month, type: ordinal }
              y: { field: category, type: ordinal }
              color: { field: sales, type: quantitative, scale: { scheme: blues } }

        vega-chart:
          title: Customer satisfaction scores (vega)
          db: jobs
          query: >-
            SELECT column1 as category, column2 as score
            FROM (VALUES
            ('Product Quality', 4.5),
            ('Customer Service', 4.2),
            ('Value for Money', 3.8),
            ('Ease of Use', 4.7),
            ('Documentation', 3.5))
          library: vega
          display:
            height: 200
            scales:
              - name: xscale
                type: linear
                domain: [0, 5]
                range: width
              - name: yscale
                type: band
                domain: { data: table, field: category }
                range: height
                padding: 0.1
              - name: color
                type: ordinal
                domain: { data: table, field: category }
                range: { scheme: category10 }
            axes:
              - orient: bottom
                scale: xscale
                title: Score (out of 5)
              - orient: left
                scale: yscale
            marks:
              - type: rect
                from: { data: table }
                encode:
                  enter:
                    y: { scale: yscale, field: category }
                    height: { scale: yscale, band: 1 }
                    x: { value: 0 }
                    x2: { scale: xscale, field: score }
                    fill: { scale: color, field: category }
                  update:
                    fillOpacity: { value: 1 }
                  hover:
                    fillOpacity: { value: 0.7 }

        map-chart:
          title: World capitals (map)
          db: jobs
          query: >-
            SELECT column1 as City, column2 as Country, column3 as latitude, column4 as longitude
            FROM (VALUES
            ('Paris', 'France', 48.8566, 2.3522),
            ('London', 'UK', 51.5074, -0.1278),
            ('Berlin', 'Germany', 52.5200, 13.4050),
            ('Tokyo', 'Japan', 35.6762, 139.6503),
            ('New York', 'USA', 40.7128, -74.0060),
            ('Sydney', 'Australia', -33.8688, 151.2093),
            ('Cairo', 'Egypt', 30.0444, 31.2357),
            ('São Paulo', 'Brazil', -23.5505, -46.6333),
            ('Mumbai', 'India', 19.0760, 72.8777),
            ('Beijing', 'China', 39.9042, 116.4074))
          library: map
          display:
            show_latlng_popup: true
